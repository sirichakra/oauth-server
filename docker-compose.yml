version: "3.9"

services:

  postgres:
    image: postgres:14
    container_name: oauth_postgres
    environment:
      POSTGRES_USER: oauth_user
      POSTGRES_PASSWORD: oauth_pass
      POSTGRES_DB: oauth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./seeds:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oauth_user"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: oauth_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: oauth_frontend
    ports:
      - "3000:80"

volumes:
  postgres_data: